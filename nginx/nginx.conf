server {
    listen 80;
    server_name localhost;

    # Docker's internal DNS — re-resolve every 30 s so stale IPs don't cause 502s after container rebuilds
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Frontend React
    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket para ataques en tiempo real
    location /ws/ {
        set $upstream_ws http://backend:8000;
        proxy_pass $upstream_ws$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
